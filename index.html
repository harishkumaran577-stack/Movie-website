<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix - Watch Movies Online</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">MovieFlix</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">New & Popular</a></li>
                <li><a href="#">My List</a></li>
            </ul>
            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Unlimited movies, TV shows, and more.</h1>
                <p>Watch anywhere. Cancel anytime.</p>
                <button class="cta-button">Get Started</button>
            </div>
        </section>

        <section class="movie-grid">
            <h2>Popular on MovieFlix</h2>
            <div class="movies">
                <div class="movie-card">
                    <img src="https://via.placeholder.com/300x450" alt="Movie 1">
                    <h3>Movie Title 1</h3>
                </div>
                <div class="movie-card">
                    <img src="https://via.placeholder.com/300x450" alt="Movie 2">
                    <h3>Movie Title 2</h3>
                </div>
                <div class="movie-card">
                    <img src="https://via.placeholder.com/300x450" alt="Movie 3">
                    <h3>Movie Title 3</h3>
                </div>
                <div class="movie-card">
                    <img src="https://via.placeholder.com/300x450" alt="Movie 4">
                    <h3>Movie Title 4</h3>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 MovieFlix. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
